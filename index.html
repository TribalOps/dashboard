
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tribal Training | Team Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#E05A1C;
  --orange-dim:#7a2e0e;
  --black:#000;
  --surface:#0d0d0d;
  --border:#1c1c1c;
  --border-subtle:#111;
  --text:#e8e8e8;
  --text-muted:#aaa;
  --text-dim:#444;
  --text-dimmer:#2e2e2e;
  --green:#5cb86a;
  --blue:#4a9ad4;
}
body{background:var(--black);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:24px 16px}
.wrap{max-width:900px;margin:0 auto}

/* HEADER */
.hdr{display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:18px;border-bottom:1px solid var(--border);margin-bottom:20px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;color:#fff;line-height:1}
.logo span{color:var(--orange)}
.tag{font-size:10px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;margin-top:3px}
.wpill{background:var(--orange);color:#fff;font-size:11px;font-weight:500;padding:5px 14px;border-radius:20px;white-space:nowrap}

/* SECTION LABEL */
.sec{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-dimmer);font-weight:500;margin:0 0 10px}

/* STAT CARDS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.sv{font-family:'Bebas Neue',sans-serif;font-size:28px;line-height:1;color:#fff}
.sv.hot{color:var(--orange)}
.sl{font-size:11px;color:var(--text-dim);margin-top:3px}

/* LEADERBOARD */
.lb{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:12px}
.lbh{display:grid;grid-template-columns:28px 220px 1fr 72px 72px 72px 64px;padding:8px 14px;border-bottom:1px solid var(--border);align-items:center}
.lbh div{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dimmer)}
.lbh .col-name{text-align:left}
.lbh .col-num{text-align:center}
.lbr{display:grid;grid-template-columns:28px 220px 1fr 72px 72px 72px 64px;padding:10px 14px;border-bottom:1px solid var(--border-subtle);align-items:center;transition:background 0.15s}
.lbr:last-child{border-bottom:none}
.lbr:hover{background:#111}
.rk{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--text-dimmer)}
.rk.t{color:var(--orange)}
.nm{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-wrap{height:2px;background:#1a1a1a;border-radius:1px;margin-top:4px}
.bar-fill{height:2px;background:var(--orange);border-radius:1px;transition:width 1s ease}
.lv{font-size:12px;color:var(--text-muted);text-align:center}
.dots{display:flex;gap:3px;justify-content:center}
.d{width:7px;height:7px;border-radius:50%;background:#1c1c1c}
.d.on{background:var(--orange)}
.d.half{background:var(--orange-dim)}
.empty-lb{padding:32px;text-align:center;color:var(--text-dim);font-size:13px}
.lb-pagination{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 0 4px;margin-bottom:8px}
.lb-pg-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-size:11px;padding:4px 12px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.lb-pg-btn:hover:not(:disabled){border-color:var(--orange);color:var(--orange)}
.lb-pg-btn:disabled{opacity:0.3;cursor:default}
.lb-pg-label{font-size:11px;color:var(--text-dim);letter-spacing:1px}

/* BOTTOM GRID */
.btm{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}

/* RACES */
.rrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-subtle)}
.rrow:last-of-type{border-bottom:none}
.rdt{font-size:11px;color:var(--text-dim);width:38px;flex-shrink:0}
.rn{font-size:13px;font-weight:500;color:#ddd}
.rd{font-size:10px;color:var(--text-dim);margin-top:1px}
.rbadge{font-size:10px;padding:2px 8px;border-radius:20px;margin-left:auto;flex-shrink:0;font-weight:500}
.bbu{background:#1a1a0a;color:#c98a30;border:1px solid #3a2e10}
.b70{background:#0a0d1a;color:var(--blue);border:1px solid #10203a}
.bfl{background:#1a0a0a;color:#c94040;border:1px solid #3a1010}
.b10{background:#0a1a10;color:var(--green);border:1px solid #103a18}
.bsp{background:#1a0d1a;color:#b06fd4;border:1px solid #2e1a3a}
.boly{background:#0a0d1a;color:var(--blue);border:1px solid #10203a}
.bother{background:#1a1a1a;color:var(--text-muted);border:1px solid #333}

/* ROSTER */
.roster{margin-top:12px}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.chip{font-size:10px;padding:2px 8px;border-radius:20px;background:#161616;border:1px solid #222;color:var(--text-dim)}
.chip.in{background:#0a1a0d;border-color:#1a4020;color:var(--green)}
.chip.bbu-chip{background:#1a1a0a;border-color:#3a2e10;color:#c98a30}
.chip.b70-chip{background:#0a0d1a;border-color:#10203a;color:var(--blue)}
.chip.bfl-chip{background:#1a0a0a;border-color:#3a1010;color:#c94040}
.chip.b10-chip{background:#0a1a10;border-color:#103a18;color:var(--green)}
.chip.bsp-chip{background:#1a0d1a;border-color:#2e1a3a;color:#b06fd4}
.chip.boly-chip{background:#0a0d1a;border-color:#10203a;color:var(--blue)}
.chip.bother-chip{background:#1a1a1a;border-color:#333;color:var(--text-muted)}

/* CHALLENGES */
.crow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-subtle)}
.crow:last-child{border-bottom:none}
.cico{width:26px;height:26px;border-radius:6px;background:#161616;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.cn{font-size:13px;font-weight:500;color:#ddd}
.cs{font-size:10px;color:var(--text-dim);margin-top:1px}
.cstat{font-size:11px;font-weight:500;margin-left:auto;white-space:nowrap}
.ca{color:var(--orange)}
.cd{color:var(--green)}

/* LOADING */
.loading{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:13px;letter-spacing:1px;text-transform:uppercase}
.loading span{color:var(--orange)}

/* TOGGLE */
.toggle-wrap{display:flex;gap:0;margin-bottom:12px;background:#111;border-radius:20px;padding:3px;border:1px solid var(--border)}
.toggle-btn{flex:1;font-size:11px;padding:5px 10px;border-radius:16px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:0.5px;transition:all 0.2s}
.toggle-btn.active{background:var(--orange);color:#fff}

/* RESULTS TABLE */
.results-wrap{overflow-x:auto}
.results-table{width:100%;border-collapse:collapse;font-size:12px}
.results-table th{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dimmer);padding:6px 8px;text-align:left;border-bottom:1px solid var(--border)}
.results-table td{padding:8px 8px;border-bottom:1px solid var(--border-subtle);color:var(--text-muted);vertical-align:top}
.results-table tr:last-child td{border-bottom:none}
.results-table tr:hover td{background:#111}
.result-athlete{font-weight:500;color:var(--text)}
.result-time{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--orange)}
.milestone{display:inline-block;font-size:10px;padding:1px 7px;border-radius:20px;white-space:nowrap}
.ms-pr{background:#1a0f00;border:1px solid #3a2500;color:#f0a030}
.ms-first{background:#0a1a0d;border:1px solid #1a4020;color:var(--green)}
.ms-fin{background:#0a0d1a;border:1px solid #10203a;color:var(--blue)}
.ms-podium{background:#1a0a1a;border:1px solid #3a103a;color:#b06fd4}
.no-results{padding:24px;text-align:center;color:var(--text-dim);font-size:12px}

/* PAGINATION */
.results-pagination{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 0 4px}
.pg-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-size:11px;padding:4px 12px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.2s}
.pg-btn:hover:not(:disabled){border-color:var(--orange);color:var(--orange)}
.pg-btn:disabled{opacity:0.3;cursor:default}
.pg-label{font-size:11px;color:var(--text-dim);letter-spacing:1px}

/* FOOTER */
.footer{text-align:center;padding:24px 0 8px;font-size:11px;color:var(--text-dimmer);letter-spacing:1px;text-transform:uppercase}

@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .btm{grid-template-columns:1fr}
  .lbh,.lbr{grid-template-columns:22px minmax(0,1fr) 54px 54px 0 50px}
  .lbh div:nth-child(5),.lbr .lv:nth-child(5){display:none}
  .logo{font-size:24px}
}
</style>
</head>

function parseCSV(text) {
  var lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  var headers = lines[0].split(',').map(function(h){ return h.trim().replace(/^"|"$/g,''); });
  return lines.slice(1).map(function(line) {
    var cols = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g) || line.split(',');
    cols = cols.map(function(c){ return (c||'').trim().replace(/^"|"$/g,''); });
    var obj = {};
    headers.forEach(function(h,i){ obj[h] = cols[i] || ''; });
    return obj;
  });
}

async function fetchCSV(url) {
  var res = await fetch(url, { mode: 'cors', cache: 'no-cache' });
  if (!res.ok) throw new Error('Failed to fetch: ' + url);
  return parseCSV(await res.text());
}

// ── DATE HELPERS ─────────────────────────────────────────────
function getMonday(d) {
  var day = d.getDay(), diff = d.getDate() - day + (day===0?-6:1);
  return new Date(d.setDate(diff));
}
function fmtWeek(d) {
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function fmtRaceDate(str) {
  if (!str) return '';
  var d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}).replace(',','');
}
function fmtRaceDateShort(str) {
  if (!str) return '';
  var d = new Date(str + 'T00:00:00');
  var yr = d.getFullYear();
  var now = new Date().getFullYear();
  if (yr !== now) return d.toLocaleDateString('en-US',{month:'short',year:'2-digit'});
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

// ── MILESTONE BADGE ─────────────────────────────────────────
function milestoneBadge(note) {
  var n = (note||'').toLowerCase();
  if (n.includes('pr') || n.includes('personal record') || n.includes('pb')) return '<span class="milestone ms-pr">PR 🔥</span>';
  if (n.includes('first') || n.includes('debut') || n.includes('1st')) return '<span class="milestone ms-first">First ✓</span>';
  if (n.includes('podium') || n.includes('1st place') || n.includes('2nd place') || n.includes('3rd place') || n.includes('win') || n.includes('won')) return '<span class="milestone ms-podium">Podium 🏆</span>';
  if (n.includes('finish') || n.includes('dnf') === false && note) return '<span class="milestone ms-fin">Finished</span>';
  return note ? '<span style="font-size:11px;color:var(--text-dim)">'+note+'</span>' : '';
}

// ── BADGE ────────────────────────────────────────────────────
function distBadge(dist) {
  var d = (dist||'').toLowerCase();
  if (d.includes('backyard')) return ['bbu','Backyard'];
  if (d.includes('70.3') || d.includes('half')) return ['b70','70.3'];
  if (d === 'ironman' || d.includes('full') || d.includes('140')) return ['bfl','Ironman'];
  if (d.includes('ironman')) return ['bfl','Ironman'];
  if (d.includes('100 mile') || d.includes('100m')) return ['b10','100 Mi'];
  if (d.includes('sprint')) return ['bsp','Sprint'];
  if (d.includes('olympic') || d.includes('oly')) return ['boly','Olympic'];
  return ['bother', dist||'Race'];
}

// ── STREAK DOTS ──────────────────────────────────────────────
function streakDots(n) {
  n = parseInt(n) || 0;
  var html = '<div class="dots">';
  for (var i=0;i<7;i++) {
    if (i < Math.min(n,7)) html += '<div class="d on"></div>';
    else html += '<div class="d"></div>';
  }
  return html + '</div>';
}

// ── CHALLENGE ICON ───────────────────────────────────────────
function chalIcon(icon, status) {
  var color = status === 'active' ? 'var(--orange)' : 'var(--green)';
  var icons = {
    flame:'🔥', mountain:'⛰', trophy:'🏆', swim:'🏊', run:'🏃', bike:'🚴', star:'⭐'
  };
  return icons[icon] || '●';
}

// ── RENDER ───────────────────────────────────────────────────
async function render() {
  var weekStart = getMonday(new Date());
  document.getElementById('lb-toggle') && (document.getElementById('lb-toggle').style.visibility = 'visible');

  var [weekly, races, challenges, athletes, results] = await Promise.all([
    fetchCSV(URLS.weekly).catch(function(){ return []; }),
    fetchCSV(URLS.races).catch(function(){ return []; }),
    fetchCSV(URLS.challenges).catch(function(){ return []; }),
    fetchCSV(URLS.athletes).catch(function(){ return []; }),
    URLS.results !== 'RESULTS_CSV_URL_HERE' ? fetchCSV(URLS.results).catch(function(){ return []; }) : Promise.resolve([]),
  ]);

  // Store globally for toggle
  window._allWeekly = weekly;

  // All weeks available, sorted newest first
  var weeks = [...new Set(weekly.map(function(r){ return r.Week; }))].sort().reverse();

  // Helper: get Monday of a given date
  function getMondayOf(d) {
    var day = d.getDay();
    var diff = d.getDate() - day + (day === 0 ? -6 : 1);
    var m = new Date(d); m.setDate(diff); m.setHours(0,0,0,0);
    return m;
  }

  // Get leaderboard rows for week or month mode
  function getLeaderboardRows(mode) {
    if (mode === 'month') {
      var now = new Date();
      var monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
      var monthEnd   = new Date(now.getFullYear(), now.getMonth() + 1, 0);
      var monthWeeks = weeks.filter(function(w) {
        var d = new Date(w + 'T00:00:00');
        return d >= monthStart && d <= monthEnd;
      });
      var byAthlete = {};
      weekly.filter(function(r){ return monthWeeks.includes(r.Week); }).forEach(function(r){
        var n = r.Athlete;
        if (!byAthlete[n]) byAthlete[n] = {Athlete:n, Miles:0, Hours:0, Sessions:0, ActiveDays:0};
        byAthlete[n].Miles    += parseFloat(r.Miles||0);
        byAthlete[n].Hours    += parseFloat(r.Hours||0);
        byAthlete[n].Sessions += parseInt(r.Sessions||0);
        byAthlete[n].ActiveDays += parseInt(r.ActiveDays||0);
      });
      return Object.values(byAthlete).map(function(r){
        r.Miles = parseFloat(r.Miles.toFixed(1));
        r.Hours = parseFloat(r.Hours.toFixed(1));
        return r;
      }).sort(function(a,b){ return b.Miles - a.Miles; });
    } else {
      var mondayStr = getMondayOf(new Date()).toISOString().slice(0,10);
      var matchWeek = weeks.find(function(w){ return w === mondayStr; }) || weeks[0] || '';
      var rows = weekly.filter(function(r){ return r.Week === matchWeek; });
      return rows.sort(function(a,b){ return parseFloat(b.Miles||0) - parseFloat(a.Miles||0); });
    }
  }

  window._getLeaderboardRows = getLeaderboardRows;

  // Build leaderboard HTML with 15-per-page pagination
  function buildLbHtml(rows, maxMi) {
    if (rows.length === 0) return '<div class="empty-lb">No training data yet — athletes connecting soon</div>';
    var pageSize = 15;
    var totalPg = Math.ceil(rows.length / pageSize);
    var pages = [];
    for (var p = 0; p < totalPg; p++) {
      var slice = rows.slice(p * pageSize, (p+1) * pageSize);
      var rowsHtml = slice.map(function(r, idx) {
        var i = p * pageSize + idx;
        var pct = Math.round((parseFloat(r.Miles||0) / maxMi) * 100);
        var topClass = i < 3 ? ' t' : '';
        return '<div class="lbr">'
          + '<div class="rk'+topClass+'">'+(i+1)+'</div>'
          + '<div><div class="nm">'+r.Athlete+'</div>'
          + '<div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%"></div></div></div>'
          + '<div></div>'
          + '<div class="lv">'+parseFloat(r.Miles||0).toFixed(1)+'</div>'
          + '<div class="lv">'+parseFloat(r.Hours||0).toFixed(1)+'</div>'
          + '<div class="lv">'+( r.Sessions||0)+'</div>'
          + streakDots(r.ActiveDays)
          + '</div>';
      }).join('');
      pages.push('<div class="lb-page" id="lbpage-'+p+'" style="display:'+(p===0?'block':'none')+'">'+rowsHtml+'</div>');
    }
    var pagination = totalPg > 1
      ? '<div class="lb-pagination">'
        + '<button class="lb-pg-btn" id="lb-prev" onclick="changeLbPage(-1)" disabled>← Prev</button>'
        + '<span class="lb-pg-label" id="lb-pg-label">1 / '+totalPg+'</span>'
        + '<button class="lb-pg-btn" id="lb-next" onclick="changeLbPage(1)">Next →</button>'
        + '</div>'
      : '';
    return pages.join('') + pagination;
  }
  window._buildLbHtml = buildLbHtml;

  // Week leaderboard data
  var weekRows = getLeaderboardRows('week');
  var maxMiles = weekRows.length ? parseFloat(weekRows[0].Miles||1) : 1;

  // Team stats
  var totalMiles     = weekRows.reduce(function(s,r){ return s+parseFloat(r.Miles||0); }, 0);
  var totalSessions  = weekRows.reduce(function(s,r){ return s+parseInt(r.Sessions||0); }, 0);
  var avgConsistency = weekRows.length
    ? Math.round(weekRows.reduce(function(s,r){ return s+parseFloat(r.ConsistencyPct||0); }, 0) / weekRows.length)
    : 0;
  var activeAthletes = weekRows.length;

  // Upcoming races
  var today = new Date(); today.setHours(0,0,0,0);
  var upcomingRaces = races.filter(function(r){
    return r.Date && new Date(r.Date+'T00:00:00') >= today;
  }).sort(function(a,b){ return new Date(a.Date) - new Date(b.Date); });

  // Race rows
  var raceRows = upcomingRaces.slice(0,4).map(function(r) {
    var badge = distBadge(r.Distance);
    return '<div class="rrow">'
      + '<div class="rdt">'+fmtRaceDateShort(r.Date)+'</div>'
      + '<div><div class="rn">'+r.Name+'</div>'
      + (r.Location ? '<div class="rd">'+r.Location+'</div>' : '')
      + '</div>'
      + '<div class="rbadge '+badge[0]+'">'+badge[1]+'</div>'
      + '</div>';
  }).join('');

  // Roster stacked per race
  var rosterHtml = '';
  upcomingRaces.slice(0,4).forEach(function(race) {
    var badge = distBadge(race.Distance);
    var chipClass = 'chip ' + badge[0] + '-chip';
    var signedUp = (race.Signups||'').split(',').map(function(s){ return s.trim(); }).filter(Boolean);
    var chips = signedUp.map(function(n){ return '<div class="'+chipClass+'">'+n+'</div>'; }).join('');
    rosterHtml += '<div class="roster">'
      + '<div class="sec" style="margin:0 0 6px">Signed up — '+race.Name+'</div>'
      + '<div class="chips">'+(chips||'<span style="font-size:11px;color:var(--text-dim)">No signups yet</span>')+'</div>'
      + '</div>';
  });

  // Results table (reversed, paginated)
  var resultsHtml = '';
  if (results.length === 0) {
    resultsHtml = '<div class="no-results">No race results yet — add them to the RaceResults tab in Google Sheets</div>';
  } else {
    var reversed = results.slice().reverse();
    var pageSize = 20;
    var totalPages = Math.ceil(reversed.length / pageSize);
    var pages = [];
    for (var p = 0; p < totalPages; p++) {
      var pageRows = reversed.slice(p * pageSize, (p+1) * pageSize).map(function(r) {
        return '<tr>'
          + '<td class="result-athlete">'+(r.Athlete||'')+'</td>'
          + '<td>'+(r.Race||'')+'</td>'
          + '<td class="result-time">'+(r.Time||'—')+'</td>'
          + '<td>'+milestoneBadge(r.Milestone)+'</td>'
          + '</tr>';
      }).join('');
      pages.push('<div class="results-page" id="rpage-'+p+'" style="display:'+(p===0?'block':'none')+'">'
        + '<div class="results-wrap"><table class="results-table">'
        + '<thead><tr><th>Athlete</th><th>Race</th><th>Time</th><th>Milestone</th></tr></thead>'
        + '<tbody>'+pageRows+'</tbody>'
        + '</table></div></div>');
    }
    var pagination = totalPages > 1
      ? '<div class="results-pagination" id="results-pagination">'
        + '<button class="pg-btn" id="pg-prev" onclick="changePage(-1)" disabled>← Prev</button>'
        + '<span class="pg-label" id="pg-label">1 / '+totalPages+'</span>'
        + '<button class="pg-btn" id="pg-next" onclick="changePage(1)">Next →</button>'
        + '</div>'
      : '';
    resultsHtml = pages.join('') + pagination;
  }

  // Challenge rows
  var chalRows = challenges.map(function(c) {
    var isActive = (c.Status||'').toLowerCase() === 'active';
    return '<div class="crow">'
      + '<div class="cico">'+chalIcon(c.Icon, c.Status)+'</div>'
      + '<div><div class="cn">'+c.Name+'</div><div class="cs">'+c.Description+'</div></div>'
      + '<div class="cstat '+(isActive?'ca':'cd')+'">'+(isActive?'Active':'Done ✓')+'</div>'
      + '</div>';
  }).join('');

  // Build full page HTML
  var html = ''
    + '<div class="sec" id="stat-label">Team this week</div>'
    + '<div class="stats">'
    + '<div class="sc"><div class="sv hot">'+Math.round(totalMiles).toLocaleString()+'</div><div class="sl">Total miles</div></div>'
    + '<div class="sc"><div class="sv">'+activeAthletes+'</div><div class="sl">Active athletes</div></div>'
    + '<div class="sc"><div class="sv">'+totalSessions+'</div><div class="sl">Activities logged</div></div>'
    + '<div class="sc"><div class="sv hot">'+avgConsistency+'%</div><div class="sl">Consistency rate</div></div>'
    + '</div>'
    + '<div class="sec">Weekly leaderboard</div>'
    + '<div class="lb" id="leaderboard">'
    + '<div class="lbh"><div></div><div class="col-name">athlete</div><div></div><div class="col-num">miles</div><div class="col-num">hours</div><div class="col-num">sessions</div><div class="col-num">streak</div></div>'
    + buildLbHtml(weekRows, maxMiles)
    + '</div>'
    + '<div class="btm">'
    + '<div class="panel" id="race-panel">'
    + '<div class="toggle-wrap"><button class="toggle-btn active" onclick="showUpcoming()">Upcoming</button><button class="toggle-btn" onclick="showResults()">Race Results</button></div>'
    + '<div id="upcoming-view">'+raceRows+rosterHtml+'</div>'
    + '<div id="results-view" style="display:none">'+resultsHtml+'</div>'
    + '</div>'
    + '<div class="panel"><div class="sec" style="margin:0 0 10px">Challenges</div>'+chalRows+'</div>'
    + '</div>';

  document.getElementById('main-content').innerHTML = html;
}
// ── LEADERBOARD TOGGLE ──────────────────────────────────────
var lbCurrentPage = 0;

function setLbMode(mode) {
  lbCurrentPage = 0;
  document.getElementById('btn-week').classList.toggle('active', mode === 'week');
  document.getElementById('btn-month').classList.toggle('active', mode === 'month');
  var statLabel = document.getElementById('stat-label');
  if (statLabel) statLabel.textContent = mode === 'month' ? 'Team this month' : 'Team this week';
  var rows = window._getLeaderboardRows(mode);
  var maxMi = rows.length ? parseFloat(rows[0].Miles||1) : 1;
  var lb = document.getElementById('leaderboard');
  if (!lb) return;
  var header = lb.querySelector('.lbh').outerHTML;
  lb.innerHTML = header + window._buildLbHtml(rows, maxMi);
}

function changeLbPage(dir) {
  var pages = document.querySelectorAll('#leaderboard .lb-page');
  if (!pages.length) return;
  pages[lbCurrentPage].style.display = 'none';
  lbCurrentPage = Math.max(0, Math.min(lbCurrentPage + dir, pages.length - 1));
  pages[lbCurrentPage].style.display = 'block';
  var lbl = document.getElementById('lb-pg-label');
  if (lbl) lbl.textContent = (lbCurrentPage+1) + ' / ' + pages.length;
  var prev = document.getElementById('lb-prev');
  var next = document.getElementById('lb-next');
  if (prev) prev.disabled = lbCurrentPage === 0;
  if (next) next.disabled = lbCurrentPage === pages.length - 1;
}

// ── RACE PANEL TOGGLE ────────────────────────────────────────
function showUpcoming() {
  document.getElementById('upcoming-view').style.display = 'block';
  document.getElementById('results-view').style.display = 'none';
  var btns = document.querySelectorAll('#race-panel .toggle-btn');
  if (btns[0]) btns[0].classList.add('active');
  if (btns[1]) btns[1].classList.remove('active');
}

function showResults() {
  document.getElementById('upcoming-view').style.display = 'none';
  document.getElementById('results-view').style.display = 'block';
  var btns = document.querySelectorAll('#race-panel .toggle-btn');
  if (btns[0]) btns[0].classList.remove('active');
  if (btns[1]) btns[1].classList.add('active');
}

// ── RESULTS PAGINATION ───────────────────────────────────────
var currentPage = 0;

function changePage(dir) {
  var pages = document.querySelectorAll('.results-page');
  if (!pages.length) return;
  pages[currentPage].style.display = 'none';
  currentPage = Math.max(0, Math.min(currentPage + dir, pages.length - 1));
  pages[currentPage].style.display = 'block';
  var lbl = document.getElementById('pg-label');
  if (lbl) lbl.textContent = (currentPage+1) + ' / ' + pages.length;
  var prev = document.getElementById('pg-prev');
  var next = document.getElementById('pg-next');
  if (prev) prev.disabled = currentPage === 0;
  if (next) next.disabled = currentPage === pages.length - 1;
}

render().catch(function(e){
  document.getElementById('main-content').innerHTML = '<div class="loading">Error loading data — check back shortly</div>';
  console.error(e);
});
</script>
</body>
</html>
